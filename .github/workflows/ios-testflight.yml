name: iOS → TestFlight

# Builds the Talise iOS app with Xcode 26 on a macOS 26 (Tahoe) cloud runner
# and uploads it to TestFlight. This exists because Apple now mandates the
# iOS 26 SDK for every App Store upload, and that SDK only ships in Xcode 26 —
# which won't run on the maintainer's local macOS. The build therefore happens
# entirely in GitHub's cloud; no local toolchain change required.
#
# Trigger it manually: Actions tab → "iOS → TestFlight" → Run workflow.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ASC_KEY_ID         App Store Connect API key id        (e.g. 5K9TX5CGV4)
#   ASC_ISSUER_ID      App Store Connect API issuer id     (UUID)
#   ASC_KEY_P8_BASE64  base64 of the AuthKey_<id>.p8 file  (the private key)
#
# Optional (recommended) secrets — stop the per-run certificate churn:
#   DIST_CERT_P12_BASE64   base64 of an Apple Distribution cert exported as
#                          .p12 WITH its private key (from Keychain Access)
#   DIST_CERT_P12_PASSWORD the password you set when exporting that .p12
#
# Signing is automatic: -allowProvisioningUpdates + the ASC API key let the
# cloud Mac mint/reuse the distribution cert and provisioning profiles for
# team 5N8DU2A9WH on the fly. When the DIST_CERT_P12_* secrets are present,
# the "Import distribution signing certificate" step pre-loads ONE stored
# cert into the keychain so automatic signing reuses it every run instead of
# minting a fresh cert each time (which exhausted Apple's certificate cap).

on:
  workflow_dispatch:
    inputs:
      submit_note:
        description: "Optional note (shown in the run only)"
        required: false
        default: "TestFlight build"

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-26
    timeout-minutes: 60

    env:
      SCHEME: Talise
      PROJECT: ios/Talise.xcodeproj
      ARCHIVE: build/Talise.xcarchive
      EXPORT_DIR: build/export
      EXPORT_PLIST: ios/ExportOptions-AppStore.plist
      DEV_TEAM: "5N8DU2A9WH"
      # Durable signing: when these secrets are set, the archive reuses a
      # single stored Apple Distribution cert instead of letting automatic
      # signing mint a fresh one every run (which kept filling Apple's
      # certificate cap). Job-level so the import step's `if:` can read them.
      DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
      DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain (must be Xcode 26 / iOS 26 SDK)
        run: |
          xcodebuild -version
          echo "--- iOS SDKs ---"
          xcodebuild -showsdks | grep -i iphoneos || true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Install App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      # Self-heal the certificate cap. Automatic signing mints a fresh
      # "Apple Development: Created via API" cert on every clean runner, and
      # Apple caps these — once full, the archive fails with "maximum number
      # of certificates". We revoke those THROWAWAY CI-created DEVELOPMENT
      # certs via the ASC API before archiving, so a slot is always free.
      # (We never touch DISTRIBUTION certs — the import step reuses ours — nor
      # any developer's locally-named dev cert; only "Created via API" ones.)
      # Best-effort: never fails the build.
      - name: Free Apple Development certificate slots
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          node --input-type=module <<'JS' || echo "[cert-gc] skipped (best-effort)"
          import crypto from "node:crypto";
          import fs from "node:fs";
          const keyId = process.env.ASC_KEY_ID;
          const issuer = process.env.ASC_ISSUER_ID;
          const p8 = fs.readFileSync(process.env.ASC_KEY_PATH, "utf8");
          const b64u = (b) => Buffer.from(b).toString("base64url");
          const now = Math.floor(Date.now() / 1000);
          const header = b64u(JSON.stringify({ alg: "ES256", kid: keyId, typ: "JWT" }));
          const payload = b64u(JSON.stringify({ iss: issuer, iat: now, exp: now + 600, aud: "appstoreconnect-v1" }));
          const signer = crypto.createSign("SHA256");
          signer.update(`${header}.${payload}`);
          const sig = signer.sign({ key: p8, dsaEncoding: "ieee-p1363" });
          const jwt = `${header}.${payload}.${Buffer.from(sig).toString("base64url")}`;
          const auth = { Authorization: `Bearer ${jwt}` };
          const res = await fetch("https://api.appstoreconnect.apple.com/v1/certificates?limit=200", { headers: auth });
          const body = await res.json();
          const certs = body.data || [];
          const throwaway = certs.filter((c) => {
            const t = c.attributes?.certificateType || "";
            const n = c.attributes?.name || "";
            return t.includes("DEVELOPMENT") && /created via api/i.test(n);
          });
          console.log(`[cert-gc] ${certs.length} certs total, ${throwaway.length} throwaway DEVELOPMENT to revoke`);
          for (const c of throwaway) {
            const d = await fetch(`https://api.appstoreconnect.apple.com/v1/certificates/${c.id}`, { method: "DELETE", headers: auth });
            console.log(`[cert-gc] revoke ${c.id} (${c.attributes?.name}) -> ${d.status}`);
          }
          JS

      # Import a stored Apple Distribution cert (+ private key) into a
      # throwaway keychain so the archive REUSES it. Without this, automatic
      # signing on the empty cloud keychain mints a new distribution cert
      # every run and quickly exhausts Apple's per-account certificate cap.
      # No-op until DIST_CERT_P12_BASE64 is set, so the workflow keeps
      # working in pure-automatic mode until you add the secret.
      - name: Import distribution signing certificate
        if: ${{ env.DIST_CERT_P12_BASE64 != '' }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # Let codesign/xcodebuild use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null
          # Put our keychain first in the search list so xcodebuild finds the cert.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed s/\"//g)
          rm -f "$CERT_PATH"
          echo "Imported distribution certificate:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -E 's/[0-9A-F]{40}/<sha1>/'

      - name: Resolve Swift packages
        run: |
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
            -resolvePackageDependencies

      - name: Archive (Release, automatic signing via ASC key)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$DEV_TEAM" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export .ipa (app-store-connect)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportPath "$EXPORT_DIR" \
            -exportOptionsPlist "$EXPORT_PLIST" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          echo "--- exported ---"
          ls -la "$EXPORT_DIR"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(ls "$EXPORT_DIR"/*.ipa | head -1)
          echo "Uploading $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Save .ipa as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Talise-ipa
          path: build/export/*.ipa
          if-no-files-found: ignore
