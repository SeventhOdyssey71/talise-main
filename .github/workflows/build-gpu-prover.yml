name: Build GPU Prover
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-gpu-prover.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Default ubuntu-latest runner has ~14GB free disk. CUDA dev
      # base (3.2GB) + cudnn (2.3GB) + Rust toolchain + cargo target
      # + rapidsnark/icicle-snark build artifacts blow past that. We
      # delete unused tooling (dotnet, android sdk, ghc, codeql, etc.)
      # to free ~30GB before the docker build starts.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          repository: unconfirmedlabs/sui-zklogin-gpu-prover
          path: prover

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./prover
          file: ./prover/docker/icicle-cuda/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/seventhodyssey71/sui-zklogin-gpu-prover:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
