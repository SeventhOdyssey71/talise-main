name: Talise
options:
  bundleIdPrefix: io.talise
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

# SPM deps:
# - grpc-swift v2 (split across grpc-swift-2 + nio-transport + protobuf
#   sub-packages, see https://github.com/grpc/grpc-swift-2#quick-start)
#   for the Sui fullnode gRPC SDK. See ios/Talise/Network/SuiProto/ for
#   the vendored .proto sources and ios/scripts/regen-proto.sh for
#   regenerating Swift bindings.
# - SwiftProtobuf for generated message types.
# - Google sign-in uses ASWebAuthenticationSession (Apple SDK) against
#   our backend's /api/auth/mobile/start.
packages:
  GRPC:
    url: https://github.com/grpc/grpc-swift-2
    majorVersion: 2.0.0
  GRPCNIOTransport:
    url: https://github.com/grpc/grpc-swift-nio-transport
    majorVersion: 2.0.0
  GRPCProtobuf:
    url: https://github.com/grpc/grpc-swift-protobuf
    majorVersion: 2.0.0
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    majorVersion: 1.0.0

targets:
  Talise:
    type: application
    platform: iOS
    sources:
      - path: Talise
        excludes:
          - "**/.DS_Store"
          # Don't bundle the vendored .proto sources or their READMEs —
          # they're inputs to ios/scripts/regen-proto.sh, not runtime
          # resources. The Generated/ Swift output is the build input.
          - "Network/SuiProto/proto"
          - "Network/SuiProto/README.md"
    resources:
      - Talise/Resources/Assets.xcassets
      - Talise/Resources/GoogleSans
    info:
      path: Talise/Resources/Info.plist
      properties:
        CFBundleDisplayName: Talise
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: io.talise.app
            CFBundleURLSchemes:
              - talise
              - com.googleusercontent.apps.786432206940-rnvri4af4ek2btleebt43i8ovc4h2lod
        LSApplicationQueriesSchemes: [googlechromes, googlechrome]
        NSCameraUsageDescription: "Talise uses the camera to scan payment QR codes."
        NSFaceIDUsageDescription: "Confirm sends and signatures with Face ID."
        ITSAppUsesNonExemptEncryption: false
        # Allow http://localhost API calls in dev (TALISE_API_BASE_URL).
        # Prod build sets NSAllowsArbitraryLoads:false; for now the
        # localhost exception unblocks the simulator dev flow.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        TaliseGoogleClientID: "786432206940-rnvri4af4ek2btleebt43i8ovc4h2lod.apps.googleusercontent.com"
        # Production backend — separated from the public web hostname so
        # iOS traffic stays on its own subdomain. For local dev, override
        # at the scheme level via the TALISE_API_BASE_URL environment
        # variable (see AppConfig.swift).
        TaliseAPIBaseURL: "https://app.talise.io"
    entitlements:
      path: Talise/Resources/Talise.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: production
        com.apple.developer.associated-domains:
          - applinks:talise.io
          - applinks:www.talise.io
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.talise.app
        aps-environment: production
    dependencies:
      - package: GRPC
        product: GRPCCore
      - package: GRPCNIOTransport
        # Use the Posix-only product instead of the umbrella
        # GRPCNIOTransportHTTP2; the umbrella also pulls in
        # GRPCNIOTransportHTTP2TransportServices which currently fails
        # to build against the iOS 18.2 SDK
        # (SecCertificate is not Sendable). Posix is sufficient for
        # client-side HTTP/2 on iOS via NIOSSL.
        product: GRPCNIOTransportHTTP2Posix
      - package: GRPCProtobuf
        product: GRPCProtobuf
      - package: SwiftProtobuf
        product: SwiftProtobuf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.talise.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # Unit test bundle. Hosted by the Talise app target so it can link
  # against the app's internal types (SuiGrpcClient is internal+@MainActor
  # and gated behind @available(iOS 18.0, *), matching Cohort 3/4).
  TaliseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TaliseTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Talise
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.talise.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Talise.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Talise"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Talise:
    build:
      targets:
        Talise: all
        TaliseTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - TaliseTests
