name: Talise
options:
  bundleIdPrefix: io.talise
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

# No SPM deps for the initial scaffold — Google sign-in uses
# ASWebAuthenticationSession (Apple SDK) against our backend's
# /api/auth/mobile/start, and SuiKit gets added when we wire the
# PTB builder for Send/Earn. This keeps the first build pure-Apple.

targets:
  Talise:
    type: application
    platform: iOS
    sources:
      - path: Talise
        excludes:
          - "**/.DS_Store"
    resources:
      - Talise/Resources/Assets.xcassets
      - Talise/Resources/GoogleSans
    info:
      path: Talise/Resources/Info.plist
      properties:
        CFBundleDisplayName: Talise
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: io.talise.app
            CFBundleURLSchemes:
              - talise
              - com.googleusercontent.apps.786432206940-rnvri4af4ek2btleebt43i8ovc4h2lod
        LSApplicationQueriesSchemes: [googlechromes, googlechrome]
        NSCameraUsageDescription: "Talise uses the camera to scan payment QR codes."
        NSFaceIDUsageDescription: "Confirm sends and signatures with Face ID."
        ITSAppUsesNonExemptEncryption: false
        # Allow http://localhost API calls in dev (TALISE_API_BASE_URL).
        # Prod build sets NSAllowsArbitraryLoads:false; for now the
        # localhost exception unblocks the simulator dev flow.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        TaliseGoogleClientID: "786432206940-rnvri4af4ek2btleebt43i8ovc4h2lod.apps.googleusercontent.com"
        # Production backend. For local dev, override at the scheme level via
        # the TALISE_API_BASE_URL environment variable (see AppConfig.swift).
        TaliseAPIBaseURL: "https://talise.io"
    entitlements:
      path: Talise/Resources/Talise.entitlements
      properties:
        com.apple.developer.devicecheck.appattest-environment: production
        com.apple.developer.associated-domains:
          - applinks:talise.io
          - applinks:www.talise.io
        keychain-access-groups:
          - $(AppIdentifierPrefix)io.talise.app
        aps-environment: production
    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.talise.app
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
